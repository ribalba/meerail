# Public HTTPS deployment. Use alongside the base file:
#
#   MEERAIL_DOMAIN=mail.example.com ACME_EMAIL=you@example.com \
#     docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# (or put both in .env, which compose reads automatically)
#
# Caddy fronts the stack and handles certificates itself — issuance on first
# start and renewal from then on, with no certbot and no cron. The certificates
# live in the caddy-data volume; keep it, or every restart re-issues and walks
# into Let's Encrypt's rate limits.
services:
  server:
    # Drop the base file's "8000:8000". Caddy reaches the server over the
    # `meerail` network, so the app port never needs to touch the host — and if
    # it stayed published, anyone hitting the host IP on :8000 would bypass TLS
    # entirely and get a plaintext login form.
    ports: !reset []
    # --proxy-headers makes uvicorn trust X-Forwarded-Proto/For from Caddy. Two
    # things break without it: request.url.scheme stays "http", so the session
    # cookie is issued without Secure (app/routers/auth.py), and the login rate
    # limiter keys every attempt to Caddy's container IP — one attacker's
    # failures would lock out everyone.
    #
    # --forwarded-allow-ips=* is only safe *because* of the `ports: !reset`
    # above: with nothing published, the compose network is the sole path to
    # this port and Caddy is the only thing on it that speaks to the server.
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips=*

  caddy:
    image: caddy:2-alpine
    depends_on: [server]
    ports:
      - "80:80"     # ACME HTTP-01 challenge + redirect to https
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      MEERAIL_DOMAIN: ${MEERAIL_DOMAIN:?set MEERAIL_DOMAIN to the public hostname}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL for Let\'s Encrypt expiry notices}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # certificates and ACME account key — must persist
      - caddy-config:/config
    networks: [meerail]
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
