services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meerail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meerail}
      POSTGRES_DB: ${POSTGRES_DB:-meerail}
    volumes:
      # Postgres 18+ expects a single mount at /var/lib/postgresql (not .../data);
      # this layout enables in-place pg_upgrade --link on future upgrades.
      - pg-data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meerail} -d ${POSTGRES_DB:-meerail}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tika:
    # Attachment text extraction (PDF/Office -> text). Use the `-full` tag if you
    # also want OCR of scanned/image attachments (heavier image, pulls Tesseract).
    image: apache/tika:latest
    restart: unless-stopped

  server:
    build: .
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy
      tika:
        condition: service_started
    ports:
      # The agent (on the Bridge host) and your browser/Electron both hit this.
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-meerail}:${POSTGRES_PASSWORD:-meerail}@db:5432/${POSTGRES_DB:-meerail}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-secret-change-me}
      DATA_DIR: /data
      TIKA_URL: http://tika:9998
      AGENT_TOKEN: ${AGENT_TOKEN:-}
      SERVER_AUTH_TOKEN: ${SERVER_AUTH_TOKEN:-}
      DEFAULT_SEARCH_YEARS: ${DEFAULT_SEARCH_YEARS:-0}
      CONTACTS_SCAN_YEARS: ${CONTACTS_SCAN_YEARS:-1}
    volumes:
      # Raw .eml + attachments (the DB is Postgres; these are the on-disk blobs).
      - mail-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pg-data:
  mail-data:
