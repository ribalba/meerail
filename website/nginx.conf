server {
    listen 80;
    # The nginx image's entrypoint (10-listen-on-ipv6-by-default.sh) normally adds
    # this, but it bails when default.conf differs from the packaged one — which
    # ours does. Without it `localhost` (which resolves to ::1 first) is refused,
    # and container healthchecks fail even though the site is up.
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip the text assets; the PNGs are already compressed.
    gzip on;
    gzip_types text/css text/markdown application/javascript image/svg+xml;
    gzip_min_length 512;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve SKILL.md as a download rather than letting the browser render it.
    location /downloads/ {
        default_type text/markdown;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache";
    }

    # Fingerprint-free assets, so keep the cache short enough to notice edits.
    location ~* \.(css|js|png|svg|webmanifest)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}
