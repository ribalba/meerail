# Publishes Postgres and Tika on the host's loopback. Use alongside the base
# file:
#
#   docker compose -f docker-compose.yml -f docker-compose.hostports.yml up -d
#
# The base stack keeps db and tika on the internal `meerail` network with no
# published ports, so nothing outside Docker can reach them. That is the right
# default — but the agent owns the write path, and it does not always run inside
# that network:
#
#   * natively, next to Proton Bridge (macOS and Windows always; Linux if you
#     prefer it to the container) — it reaches both over 127.0.0.1;
#   * in the host-network container of docker-compose.agent.yml, where 127.0.0.1
#     is the host's loopback rather than the compose network.
#
# `make dev` (server run natively against the containerised backing services)
# needs the same thing.
#
# Both ports are bound to 127.0.0.1 explicitly, so they are reachable from this
# machine and not from the network — leave the address on, or Docker publishes
# on 0.0.0.0 and punches straight through the host firewall to an unauthenticated
# Tika and a database with the default password.
services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  tika:
    ports:
      - "127.0.0.1:9998:9998"
